<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labs — Eric L. Sung</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 3rem 2rem;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.4rem;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            line-height: 1.5;
        }

        .subtitle a {
            color: #666;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .subtitle a:hover { color: #1a1a1a; }

        .projects {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .project {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.1rem 1.3rem;
            background: white;
            border: 1px solid #eee;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .project:hover {
            border-color: #ccc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .project-icon {
            font-size: 1.5rem;
            width: 2.2rem;
            text-align: center;
            flex-shrink: 0;
        }

        .project-info {
            flex: 1;
        }

        .project-name {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.15rem;
        }

        .project-desc {
            font-size: 0.78rem;
            color: #888;
            line-height: 1.4;
        }

        .project-arrow {
            color: #ccc;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .project:hover .project-arrow { color: #888; }

        footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
            font-size: 0.75rem;
            color: #bbb;
        }

        @media (max-width: 600px) {
            body { padding: 2rem 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Labs</h1>
            <p class="subtitle">Experiments and tools by <a href="https://ericlsung.com">Eric L. Sung</a></p>
        </header>

        <div class="projects">
            <a class="project" href="/clockwork">
                <div class="project-icon">&#128336;</div>
                <div class="project-info">
                    <div class="project-name">Clockwork</div>
                    <div class="project-desc">World clock with live weather, drag-and-drop cities, workday/weekend at a glance</div>
                </div>
                <div class="project-arrow">&rarr;</div>
            </a>
        </div>

        <footer>
            More things coming soon.
        </footer>
    </div>
</body>
</html>
